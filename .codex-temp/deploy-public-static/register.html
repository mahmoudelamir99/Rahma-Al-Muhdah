<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>انضم إلى شبكة شركائنا | الرحمة المهداه للتوظيف</title>
  </head>
  <body>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const redirect = params.get('redirect');
        const target = new URL('./%D8%AA%D8%B3%D8%AC%D9%8A%D9%84-%D8%A7%D9%84%D8%AF%D8%AE%D9%88%D9%84-%D9%88%D8%A5%D9%86%D8%B4%D8%A7%D8%A1-%D8%AD%D8%B3%D8%A7%D8%A8/dist/index.html', window.location.href);
        target.searchParams.set('view', 'register');
        if (redirect) {
          target.searchParams.set('redirect', redirect);
        }
        window.location.replace(target.toString());
      })();
    </script>
  </body>
</html>
