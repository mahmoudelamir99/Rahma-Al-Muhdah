      - article [ref=e24]:
        - paragraph [ref=e26]: توفر منصة الرحمة المهداه خدمات عرض الوظائف، تسجيل الشركات، استقبال طلبات التوظيف، ومتابعة حالة الطلبات. يلتزم المستخدم أو الشركة بتقديم بيانات صحيحة ومحدثة، وعدم نشر أو إرسال محتوى مضلل أو مخالف للقانون أو يمس حقوق الآخرين. تحتفظ الإدارة بحق مراجعة أو إيقاف أي حساب أو وظيفة أو طلب عند وجود مخالفة أو اشتباه في إساءة الاستخدام. كما تحتفظ المنصة بحق تعديل المحتوى أو الخدمات أو آلية التشغيل متى كان ذلك ضروريًا لتحسين الخدمة أو الامتثال للالتزامات التنظيمية. استمرار استخدام المنصة بعد أي تحديث جوهري يُعد موافقة على النسخة الأحدث من هذه الشروط.
