<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>إنشاء حساب شركة | الرحمة المهداه للتوظيف</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
        background:
          radial-gradient(circle at 18% 12%, rgba(0, 93, 172, 0.14), transparent 30%),
          radial-gradient(circle at 82% 10%, rgba(15, 53, 108, 0.16), transparent 34%),
          linear-gradient(180deg, #f8fbfe 0%, #edf4f8 100%);
        font-family: "Cairo", system-ui, sans-serif;
        color: #11213d;
      }
      .shell {
        width: min(100%, 760px);
        border-radius: 26px;
        border: 1px solid rgba(15, 23, 42, 0.09);
        background: rgba(255, 255, 255, 0.93);
        backdrop-filter: blur(14px);
        box-shadow: 0 28px 72px rgba(15, 23, 42, 0.14);
        overflow: hidden;
      }
      .bar { height: 10px; background: linear-gradient(90deg, #005dac, #11356c); }
      .content { padding: clamp(1.2rem, 4vw, 2.4rem); text-align: center; }
      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 34px;
        border-radius: 999px;
        padding: 0 14px;
        font-weight: 900;
        font-size: 13px;
        color: #144b77;
        border: 1px solid rgba(0, 93, 172, 0.2);
        background: rgba(0, 93, 172, 0.09);
      }
      h1 { margin: 14px 0 0; font-size: clamp(1.6rem, 3.8vw, 2.35rem); }
      p { margin: 12px auto 0; color: #5b6d82; line-height: 1.9; max-width: 40rem; }
      .actions { margin-top: 18px; display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
      .btn {
        min-height: 46px;
        border-radius: 14px;
        border: 1px solid transparent;
        padding: 0 16px;
        font-weight: 900;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
      }
      .btn-primary { color: #fff; background: linear-gradient(135deg, #005dac, #11356c); }
      .btn-ghost { color: #144b77; background: #fff; border-color: rgba(15, 23, 42, 0.12); }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="bar"></div>
      <section class="content">
        <span class="badge">إنشاء حساب شركة</span>
        <h1>جارٍ تحويلك لصفحة التسجيل</h1>
        <p>لو لم يتم التحويل تلقائيًا، اضغط الزر التالي للانتقال مباشرة إلى نموذج إنشاء الحساب.</p>
        <div class="actions">
          <a class="btn btn-primary" id="go-register" href="#">متابعة إنشاء الحساب</a>
          <a class="btn btn-ghost" href="index.html">العودة للرئيسية</a>
        </div>
      </section>
    </main>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const redirect = params.get('redirect');
        const target = new URL('./تسجيل-الدخول-وإنشاء-حساب/dist/index.html', window.location.href);
        target.searchParams.set('view', 'register');
        if (redirect) target.searchParams.set('redirect', redirect);
        const href = target.toString();
        const btn = document.getElementById('go-register');
        if (btn) btn.setAttribute('href', href);
        window.setTimeout(() => window.location.replace(href), 120);
      })();
    </script>
  </body>
</html>
