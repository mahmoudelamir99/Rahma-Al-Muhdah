<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow,noarchive,nosnippet" />
    <meta http-equiv="refresh" content="0; url=/admin-dashboard/#/dashboard" />
    <title>لوحة الشركات | الرحمة المهداة للتوظيف</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 18% 12%, rgba(0, 93, 172, 0.08), transparent 28%),
          radial-gradient(circle at 82% 14%, rgba(15, 53, 108, 0.1), transparent 26%),
          linear-gradient(180deg, #f8fbfe 0%, #edf4f8 100%);
        font-family: "Cairo", system-ui, sans-serif;
        color: #10213d;
      }
      .card {
        width: min(100%, 720px);
        border-radius: 28px;
        border: 1px solid rgba(15, 23, 42, 0.08);
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 28px 70px rgba(15, 23, 42, 0.12);
        padding: clamp(1.4rem, 4vw, 2.2rem);
        text-align: center;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 34px;
        padding: 0 14px;
        border-radius: 999px;
        background: rgba(0, 93, 172, 0.08);
        border: 1px solid rgba(0, 93, 172, 0.14);
        color: #144b77;
        font-size: 13px;
        font-weight: 900;
      }
      h1 { margin: 14px 0 0; font-size: clamp(1.7rem, 4vw, 2.4rem); }
      p { margin: 12px auto 0; max-width: 42rem; color: #5b6d82; line-height: 1.9; }
      .actions { margin-top: 18px; display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
      a {
        min-height: 46px;
        border-radius: 14px;
        padding: 0 16px;
        font-weight: 900;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
      }
      .primary { color: #fff; background: linear-gradient(135deg, #005dac, #11356c); }
      .ghost { color: #144b77; background: #fff; border: 1px solid rgba(15, 23, 42, 0.12); }
    </style>
    <script>
      window.location.replace('/admin-dashboard/#/dashboard');
    </script>
  </head>
  <body>
    <main class="card">
      <span class="badge">لوحة الشركات</span>
      <h1>جارٍ تحويلك إلى لوحة الشركات</h1>
      <p>من هنا تتابع الوظائف والطلبات الخاصة بحساب الشركة بعد تسجيل الدخول.</p>
      <div class="actions">
        <a class="primary" href="/admin-dashboard/#/dashboard">فتح اللوحة</a>
        <a class="ghost" href="/admin-dashboard/#/login">تسجيل دخول الشركات</a>
      </div>
    </main>
  </body>
</html>
